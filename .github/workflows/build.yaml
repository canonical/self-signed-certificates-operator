name: Build

on:
  workflow_call:
    inputs:
      use-charmcraft-cache:
        required: false
        default: false
        type: boolean
    outputs:
      charm-path-amd64:
        description: Path to the built amd64 charm
        value: ${{ jobs.build-charm-under-test.outputs.charm-path-amd64 }}
      charm-path-arm64:
        description: Path to the built arm64 charm
        value: ${{ jobs.build-charm-under-test.outputs.charm-path-arm64 }}

jobs:
  build-charm-under-test:
    strategy:
      matrix:
        arch:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: [self-hosted, linux, ARM64, medium, noble]
    runs-on: ${{ matrix.arch.runner }}
    outputs:
      charm-path-amd64: ${{ steps.charm-path.outputs.charm_path_amd64 }}
      charm-path-arm64: ${{ steps.charm-path.outputs.charm_path_arm64 }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup LXD
        uses: canonical/setup-lxd@main
        with:
          channel: 5.21/stable

      - name: Install charmcraft
        run: |
          sudo snap install charmcraft --classic
          echo CHARMCRAFT_BIN=charmcraft >> $GITHUB_ENV

      - name: Install charmcraft cache
        if: ${{ inputs.use-charmcraft-cache }}
        run: |
          # Ensure pipx is available
          if ! command -v pipx &> /dev/null; then
            # Install pipx via system package manager
            sudo apt update && sudo apt install -y pipx
            # Ensure pipx is in PATH
            export PATH="$HOME/.local/bin:$PATH"
            echo "$HOME/.local/bin" >> $GITHUB_PATH
          fi
          pipx install charmcraftcache
          echo CHARMCRAFT_BIN=ccc >> $GITHUB_ENV

      - name: Build charm under test
        run: ${{ env.CHARMCRAFT_BIN }} pack --verbose

      - name: Archive Charm Under Test
        uses: actions/upload-artifact@v4
        with:
          name: built-charm-${{ matrix.arch.arch }}
          path: "*.charm"
          retention-days: 5

      - name: Get Charm Under Test Path
        id: charm-path
        run: echo "charm_path_${{ matrix.arch.arch }}=$(find . -name '*.charm' -type f -print)" >> $GITHUB_OUTPUT
